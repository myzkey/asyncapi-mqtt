asyncapi: 3.0.0

channels:
  telemetry:
    address: drones/{droneId}/telemetry
  command:
    address: drones/{droneId}/command

operations:
  sendTelemetry:
    action: send
    channel:
      $ref: '#/channels/telemetry'
    bindings:
      mqtt:
        qos: 1
  receiveCommand:
    action: receive
    channel:
      $ref: '#/channels/command'

messages:
  telemetry:
    payload:
      type: object
      required:
        - latitude
        - longitude
      properties:
        latitude:
          type: number
        longitude:
          type: number
        altitude:
          type: number
  command:
    payload:
      type: object
      required:
        - command
      properties:
        command:
          type: string
          enum:
            - takeoff
            - land
            - return_home
        issuedAt:
          type: string
