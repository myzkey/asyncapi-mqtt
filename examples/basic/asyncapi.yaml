asyncapi: 3.0.0

channels:
  telemetry:
    address: drones/{droneId}/telemetry

operations:
  sendTelemetry:
    action: send
    channel:
      $ref: '#/channels/telemetry'

messages:
  telemetry:
    payload:
      type: object
      required:
        - latitude
        - longitude
      properties:
        latitude:
          type: number
        longitude:
          type: number
